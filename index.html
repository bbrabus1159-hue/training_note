<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>トレーニングノート</title>
<style>
/* ============================================================
<!DOCTYPE html>
   <html lang="ja">
   <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
   <title>トレーニングノート</title>
   <style>
   /* ============================================================
      Variables — Industrial Dark
      ============================================================ */
   :root{
        --bg:#0d1117;--s1:#161b22;--s2:#1c2128;--s3:#21262d;
        --border:#30363d;
        --accent:#e6a817;--a10:rgba(230,168,23,.10);--a25:rgba(230,168,23,.25);
        --text:#e6edf3;--t2:#8b949e;--t3:#484f58;
        --red:#f85149;--red10:rgba(248,81,73,.10);
        --green:#3fb950;--green10:rgba(63,185,80,.10);
        --blue:#58a6ff;--blue10:rgba(88,166,255,.12);
        --purple:#a371f7;--purple10:rgba(163,113,247,.12);
        --r:12px;--rsm:8px;
        --safe-b:env(safe-area-inset-bottom,0px);
   }
   *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
   body{
        font-family:-apple-system,'Hiragino Sans',sans-serif;
        background:var(--bg);color:var(--text);
        overscroll-behavior:none;-webkit-overflow-scrolling:touch;
   }Variables — Industrial Dark
   ============================================================ */
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#1c2128;--s3:#21262d;
  --border:#30363d;
  --accent:#e6a817;--a10:rgba(230,168,23,.10);--a25:rgba(230,168,23,.25);
  --text:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --red:#f85149;--red10:rgba(248,81,73,.10);
  --green:#3fb950;--green10:rgba(63,185,80,.10);
  --blue:#58a6ff;--blue10:rgba(88,166,255,.12);
  --purple:#a371f7;--purple10:rgba(163,113,247,.12);
  --r:12px;--rsm:8px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);
  overscroll-behavior:none;-webkit-overflow-scrolling:touch;
}

/* ── Pages ── */
.page{display:none;padding:14px 13px;padding-bottom:calc(82px + var(--safe-b));min-height:100svh}
.page.active{display:block}
.page-title{font-size:18px;font-weight:900;margin-bottom:14px;letter-spacing:-.5px;display:flex;align-items:center;gap:6px}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px}

* ── Section label ── */
.sh{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}

/* ── Inputs ── */
input,select,textarea{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);
  color:var(--text);font-family:inherit;font-size:14px;outline:none;
  transition:border-color .15s;-webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{width:100%;padding:9px 11px;resize:none;height:52px}

/* ── Buttons ── */
.btn{border:none;border-radius:var(--rsm);cursor:pointer;font-family:inherit;font-weight:600;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.96);opacity:.8}
.btn-accent{background:var(--accent);color:#000;font-size:14px;padding:10px 16px}
.btn-ghost{background:var(--s2);border:1px solid var(--border);color:var(--t2);font-size:13px;padding:8px 12px}
.btn-icon{background:var(--s2);border:1px solid var(--border);color:var(--t2);width:32px;height:32px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0}
.btn-red{background:var(--red10);border:1px solid var(--red);color:var(--red);font-size:13px;padding:8px 14px}

/* ============================================================
   WEEK SUMMARY
   ============================================================ */
.week-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ws-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.ws-label{font-size:10px;color:var(--t2);letter-spacing:.5px;margin-bottom:4px}
.ws-value{font-size:22px;font-weight:900;color:var(--accent);line-height:1.1}
.ws-sub{font-size:11px;color:var(--t2);margin-top:3px}

/* ============================================================
   EXERCISE BLOCK
   ============================================================ */
.ex-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
.ex-header{display:flex;align-items:center;padding:11px 13px;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px}
.ex-name{font-size:15px;font-weight:700;flex:1;min-width:80px}
.ex-toggles{display:flex;gap:8px;align-items:center}

/* Toggle */
.tgl-wrap{display:flex;align-items:center;gap:4px;cursor:pointer}
.tgl-lbl{font-size:11px;color:var(--t2)}
.tgl{width:34px;height:18px;background:var(--s3);border-radius:9px;border:1px solid var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--accent);border-color:var(--accent)}
.tgl::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tgl.on::after{transform:translateX(16px)}

.ex-body{padding:10px 13px}

/* prev badge */
.prev-badge{display:flex;align-items:center;gap:6px;margin-bottom:10px;background:var(--a10);border-radius:var(--rsm);padding:7px 10px}
.prev-label{font-size:10px;color:var(--t2);flex-shrink:0}
.prev-data{font-size:11px;color:var(--accent);flex:1;line-height:1.5}
.prev-copy{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-weight:600;flex-shrink:0}

/* set row */
.set-list{margin-bottom:8px}
.set-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:nowrap}
.set-num{font-size:11px;color:var(--t3);width:16px;text-align:center;flex-shrink:0}

/* stepper */
.stepper{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden;flex-shrink:0}
.sp-btn{background:var(--s2);border:none;color:var(--t2);width:30px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .1s}
.sp-btn:active{background:var(--s3)}
.sp-val{background:var(--bg);color:var(--text);font-size:13px;font-weight:600;width:46px;text-align:center;border:none;outline:none;height:34px;padding:0;font-family:inherit;font-variant-numeric:tabular-nums}
.sp-unit{font-size:10px;color:var(--t3);padding:0 4px 0 0;background:var(--bg);height:34px;display:flex;align-items:center}

/* bodyweight tag */
.bw-tag{font-size:12px;font-weight:700;color:var(--accent);background:var(--a10);border:1px solid var(--a25);border-radius:var(--rsm);padding:0 10px;height:34px;display:flex;align-items:center;flex-shrink:0}

/* side selector */
.side-sel{display:flex;gap:3px;flex-shrink:0}
.side-btn{font-size:11px;font-weight:700;padding:0 8px;height:28px;border-radius:6px;background:var(--s2);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .15s}
.side-btn.L{background:var(--blue10);border-color:var(--blue);color:var(--blue)}
.side-btn.R{background:var(--purple10);border-color:var(--purple);color:var(--purple)}

/* done check */
.set-done{width:28px;height:28px;border-radius:6px;background:var(--s2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all .15s}
.set-done.checked{background:var(--green10);border-color:var(--green);color:var(--green)}

.set-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px;flex-shrink:0;line-height:1}

/* add set */
.add-set-btn{width:100%;background:var(--s2);border:1px dashed var(--border);border-radius:var(--rsm);color:var(--t2);font-size:13px;padding:8px;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s}
.add-set-btn:hover{border-color:var(--accent);color:var(--accent)}

/* timer badge */
.timer-badge{display:none;align-items:center;gap:6px;margin-top:8px;background:var(--s3);border-radius:var(--rsm);padding:6px 10px}
.timer-badge.show{display:flex}
.tb-label{font-size:11px;color:var(--t2)}
.tb-time{font-size:14px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;flex:1}
.tb-btn{font-size:11px;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px}
.tb-plus{color:var(--accent)}
.tb-skip{color:var(--t2)}

/* add ex button */
.add-ex-btn{width:100%;background:var(--s1);border:1px dashed var(--border);border-radius:var(--r);color:var(--t2);font-size:14px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s;margin-bottom:9px}
.add-ex-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ============================================================
   BOTTOM NAV
   ============================================================ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding-bottom:var(--safe-b);z-index:100;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--t3);transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.3px}

/* ============================================================
   SHEET (種目選択)
   ============================================================ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;opacity:0;transition:opacity .25s}
.overlay.open{display:block;opacity:1}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);border-radius:18px 18px 0 0;border-top:1px solid var(--border);
  z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:80svh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 12px;flex-shrink:0}
.sheet-title{font-size:16px;font-weight:700;padding:0 16px 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
.sheet-search{padding:10px 16px;flex-shrink:0}
.sheet-search input{width:100%;padding:9px 12px;font-size:14px}
.sheet-body{overflow-y:auto;padding:8px 16px 16px;flex:1;-webkit-overflow-scrolling:touch}
.sh-sec{font-size:10px;color:var(--t3);letter-spacing:1px;margin:10px 0 6px;font-weight:700}
.sh-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.ex-chip{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:13px;padding:7px 12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ex-chip:active{background:var(--a10);border-color:var(--accent);color:var(--accent)}

/* ============================================================
   CALENDAR
   ============================================================ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:17px;font-weight:700}
.cal-nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--t2);width:34px;height:34px;border-radius:var(--rsm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;color:var(--t3);padding:4px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;position:relative;transition:all .15s;border:1px solid transparent}
.cal-day.empty{cursor:default}
.cal-day.trained{background:var(--a10);color:var(--accent);font-weight:700;border-color:var(--a25)}
.cal-day.today{border-color:var(--accent) !important}
.cal-day.today.trained{background:var(--a25)}
.cal-day.selected{background:var(--s2);border-color:var(--border)}
.cal-day:not(.empty):not(.trained):hover{background:var(--s2)}

.cal-detail{margin-top:14px}
.cal-det-date{font-size:13px;color:var(--t2);margin-bottom:8px;font-weight:600}
.cal-ex-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;margin-bottom:6px}
.cal-ex-name{font-size:14px;font-weight:600;margin-bottom:4px}
.cal-set-txt{font-size:12px;color:var(--t2);line-height:1.9}

/* ============================================================
   STATS
   ============================================================ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.stat-label{font-size:10px;color:var(--t2);letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:900;color:var(--accent);line-height:1}
.stat-unit{font-size:11px;color:var(--t2);margin-top:3px}

.max-table{width:100%;border-collapse:collapse}
.max-table tr{border-bottom:1px solid var(--border)}
.max-table tr:last-child{border-bottom:none}
.max-table td{padding:8px 4px;font-size:13px}
.max-table .td-val{text-align:right;font-weight:700;color:var(--accent);font-size:14px}

/* ============================================================
   SETTINGS
   ============================================================ */
.danger-zone{border:1px solid var(--red);border-radius:var(--r);padding:13px;margin-top:12px}
.danger-title{font-size:12px;color:var(--red);font-weight:700;margin-bottom:10px;letter-spacing:.5px}

/* ============================================================
   TOAST
   ============================================================ */
#toast{
  position:fixed;bottom:calc(82px + var(--safe-b) + 12px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--s3);border:1px solid var(--border);border-radius:20px;
  color:var(--text);font-size:13px;padding:8px 16px;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:400;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- ======== PAGE: 記録 ======== -->
  <div id="page-record" class="page active">
    <div class="page-title">🏋️ 記録</div>
    <div class="week-summary" id="week-summary"></div>
    <div id="today-label" style="font-size:12px;color:var(--t2);margin-bottom:10px"></div>
    <div id="ex-list"></div>
    <button class="add-ex-btn" onclick="openSheet()">＋ 種目を追加</button>
    <div class="card">
      <div class="sh">メモ</div>
      <textarea id="note-input" placeholder="今日のコンディション・気づきなど..." onchange="saveNote()"></textarea>
    </div>
  </div>

  <!-- ======== PAGE: カレンダー ======== -->
  <div id="page-calendar" class="page">
    <div class="page-title">📅 カレンダー</div>
    <div class="card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="cal-detail" id="cal-detail"></div>
  </div>

  <!-- ======== PAGE: 統計 ======== -->
  <div id="page-stats" class="page">
    <div class="page-title">📊 統計</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div id="stats-extra"></div>
  </div>

  <!-- ======== PAGE: 設定 ======== -->
  <div id="page-settings" class="page">
    <div class="page-title">⚙️ 設定</div>
    <div class="card">
      <div class="sh">データ管理</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="exportData()">📤 エクスポート</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">📥 インポート</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="danger-zone">
      <div class="danger-title">DANGER ZONE</div>
      <button class="btn btn-red" onclick="clearAll()">🗑️ 全データを削除</button>
    </div>
  </div>

  <!-- ======== BOTTOM NAV ======== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="record" onclick="switchTab('record')">
      <div class="nav-icon">🏋️</div><div class="nav-label">記録</div>
    </button>
    <button class="nav-btn" data-tab="calendar" onclick="switchTab('calendar')">
      <div class="nav-icon">📅</div><div class="nav-label">カレンダー</div>
    </button>
    <button class="nav-btn" data-tab="stats" onclick="switchTab('stats')">
      <div class="nav-icon">📊</div><div class="nav-label">統計</div>
    </button>
    <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">
      <div class="nav-icon">⚙️</div><div class="nav-label">設定</div>
    </button>
  </nav>

  <!-- ======== EXERCISE SHEET ======== -->
  <div id="overlay" class="overlay" onclick="closeSheet()"></div>
  <div id="ex-sheet" class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">種目を選択</div>
    <div class="sheet-search">
      <input type="search" id="sheet-q" placeholder="検索 / 新規入力..."
        oninput="renderSheetList()"
        onkeydown="if(event.key==='Enter')confirmSheetInput()">
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>
</div>

<script>
/* ============================================================
   Storage
   ============================================================ */
const STORE_KEY = 'tn_sessions';
// v3など旧バージョンのキー候補
const LEGACY_KEYS = ['tn_logs','training-logs','tl_logs','trainingLogs','training_note','workout_logs','tn_v3'];

const PRESETS = [
  'ベンチプレス','インクラインDBプレス','チェストフライ','ディップス','腕立て伏せ',
  'スクワット','レッグプレス','レッグカール','レッグエクステンション','ブルガリアンSQ',
  'デッドリフト','ルーマニアンDL',
  'ラットプルダウン','チンニング','ベントオーバーロウ','シーテッドロウ','フェイスプル',
  'ショルダープレス','サイドレイズ','リアレイズ',
  'バーベルカール','DBカール','ハンマーカール',
  'トライセプスPD','スカルクラッシャー','ケーブルPD',
  'プランク','クランチ','レッグレイズ',
  'ランニング','ウォーキング','自転車'
];

function getSessions(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]')}catch{return[]}
}
function setSessions(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}

function getToday(){return new Date().toISOString().split('T')[0]}
function dateStr(d){return d.toISOString().split('T')[0]}

function getTodaySession(){return getSessions().find(s=>s.date===getToday())||null}
function upsertSession(sess){
  const all=getSessions().filter(s=>s.date!==sess.date);
  all.push(sess);setSessions(all);
}

/* ============================================================
   Migration — 旧キーからデータを引き継ぐ
   ============================================================ */
function migrateIfNeeded(){
  if(localStorage.getItem(STORE_KEY))return;
  for(const key of LEGACY_KEYS){
    const raw=localStorage.getItem(key);
    if(!raw)continue;
    try{
      const data=JSON.parse(raw);
      if(!Array.isArray(data)||!data.length)continue;
      // フィールドを補完して新形式で保存
      const migrated=data.map(s=>({
        id:s.id||('sess_'+Math.random().toString(36).slice(2)),
        date:s.date||getToday(),
        exercises:(s.exercises||[]).map(ex=>({
          id:ex.id||('ex_'+Math.random().toString(36).slice(2)),
          name:ex.name||'',
          bodyweight:!!ex.bodyweight,
          sideBySide:!!ex.sideBySide,
          sets:(ex.sets||[]).map(set=>({
            id:set.id||('set_'+Math.random().toString(36).slice(2)),
            weight:set.weight||0,reps:set.reps||0,
            side:set.side||null,done:!!set.done
          }))
        })),
        note:s.note||''
      }));
      localStorage.setItem(STORE_KEY,JSON.stringify(migrated));
      showToast('✅ 旧データを引き継ぎました');
      return;
    }catch{}
  }
}

/* ============================================================
   App State
   ============================================================ */
let today = null;          // 今日のセッション
let calY = new Date().getFullYear();
let calM = new Date().getMonth();
let calSel = null;         // カレンダー選択日
let timerIv = null;
let timerRem = 90;
let timerExId = null;

/* ============================================================
   Boot
   ============================================================ */
function init(){
  migrateIfNeeded();
  today = getTodaySession() || newSession();
  renderRecord();
}

function newSession(){
  return{id:'sess_'+Date.now(),date:getToday(),exercises:[],note:''};
}

function save(){upsertSession(today)}

/* ============================================================
   Tab
   ============================================================ */
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='calendar')renderCalendar();
  if(tab==='stats')renderStats();
}

/* ============================================================
   RECORD PAGE
   ============================================================ */
function renderRecord(){
  renderWeekSummary();
  renderTodayLabel();
  renderExList();
  document.getElementById('note-input').value=today.note||'';
}

/* Week Summary */
function renderWeekSummary(){
  const sessions=getSessions();
  const now=new Date();
  const dow=now.getDay();
  const weekStart=new Date(now);
  weekStart.setDate(now.getDate()-(dow===0?6:dow-1));
  weekStart.setHours(0,0,0,0);

  const weekCount=sessions.filter(s=>{
    const d=new Date(s.date);return d>=weekStart&&d<=now;
  }).length;

  const past=sessions.filter(s=>s.date!==getToday())
    .sort((a,b)=>b.date.localeCompare(a.date));
  let lastStr='記録なし';
  if(past[0]){
    const diff=Math.round((now-new Date(past[0].date))/86400000);
    lastStr=diff===0?'昨日':diff===1?'昨日':diff+'日前';
  }

  const days=['日','月','火','水','木','金','土'];
  document.getElementById('week-summary').innerHTML=`
    <div class="ws-card">
      <div class="ws-label">TODAY</div>
      <div class="ws-value" style="font-size:17px;color:var(--text)">
        ${now.getMonth()+1}/${now.getDate()}<span style="font-size:13px;color:var(--t2);margin-left:4px">（${days[dow]}）</span>
      </div>
      <div class="ws-sub">前回 ${lastStr}</div>
    </div>
    <div class="ws-card">
      <div class="ws-label">今週のトレーニング</div>
      <div class="ws-value">${weekCount}</div>
      <div class="ws-sub">回</div>
    </div>
  `;
}

function renderTodayLabel(){
  document.getElementById('today-label').textContent=today.date+' の記録';
}

/* Exercise List */
function renderExList(){
  const el=document.getElementById('ex-list');
  el.innerHTML='';
  today.exercises.forEach(ex=>el.appendChild(buildExBlock(ex)));
}

function buildExBlock(ex){
  const wrap=document.createElement('div');
  wrap.className='ex-block';
  wrap.id='exb-'+ex.id;

  const prev=getPrevEx(ex.name);
  const prevHtml=prev?buildPrevHtml(ex,prev):'';

  wrap.innerHTML=`
    <div class="ex-header">
      <div class="ex-name">${esc(ex.name)}</div>
      <div class="ex-toggles">
        <div class="tgl-wrap" onclick="toggleBW('${ex.id}')">
          <div class="tgl-lbl">自重</div>
          <div class="tgl ${ex.bodyweight?'on':''}" id="tgl-bw-${ex.id}"></div>
        </div>
        <div class="tgl-wrap" onclick="toggleSide('${ex.id}')">
          <div class="tgl-lbl">左右別</div>
          <div class="tgl ${ex.sideBySide?'on':''}" id="tgl-side-${ex.id}"></div>
        </div>
        <div class="btn-icon" onclick="removeEx('${ex.id}')">✕</div>
      </div>
    </div>
    <div class="ex-body">
      ${prevHtml}
      <div class="set-list" id="sets-${ex.id}"></div>
      <button class="add-set-btn" onclick="addSet('${ex.id}')">＋ セット追加</button>
      <div class="timer-badge" id="tmr-${ex.id}"></div>
    </div>
  `;
  renderSetList(ex,wrap);
  return wrap;
}

function buildPrevHtml(ex,prev){
  const rows=prev.sets.map((s,i)=>{
    const w=prev.bodyweight?'BW':`${s.weight}kg`;
    const sd=s.side?` [${s.side}]`:'';
    return `${i+1}:${w}×${s.reps}${sd}`;
  }).join('　');
  return `
    <div class="prev-badge">
      <div class="prev-label">前回</div>
      <div class="prev-data">${esc(rows)}</div>
      <button class="prev-copy" onclick="copyPrev('${ex.id}')">コピー</button>
    </div>`;
}

function renderSetList(ex,wrap){
  const el=(wrap||document.getElementById('exb-'+ex.id))?.querySelector('#sets-'+ex.id);
  if(!el)return;
  el.innerHTML='';
  ex.sets.forEach((set,i)=>el.appendChild(buildSetRow(ex,set,i+1)));
}

function buildSetRow(ex,set,num){
  const row=document.createElement('div');
  row.className='set-row';
  row.id='setr-'+set.id;

  // weight area
  let wHtml='';
  if(ex.bodyweight){
    wHtml=`<div class="bw-tag">自重</div>`;
  }else{
    wHtml=`
      <div class="stepper">
        <button class="sp-btn" onclick="chgW('${ex.id}','${set.id}',-2.5)">−</button>
        <input class="sp-val" type="number" inputmode="decimal" value="${set.weight}" step="2.5" min="0"
          onchange="setW('${ex.id}','${set.id}',this.value)">
        <div class="sp-unit">kg</div>
        <button class="sp-btn" onclick="chgW('${ex.id}','${set.id}',2.5)">＋</button>
      </div>`;
  }

  // reps
  const rHtml=`
    <div class="stepper">
      <button class="sp-btn" onclick="chgR('${ex.id}','${set.id}',-1)">−</button>
      <input class="sp-val" type="number" inputmode="numeric" value="${set.reps}" step="1" min="0"
        onchange="setR('${ex.id}','${set.id}',this.value)">
      <div class="sp-unit">rep</div>
      <button class="sp-btn" onclick="chgR('${ex.id}','${set.id}',1)">＋</button>
    </div>`;

  // side
  const sideHtml=ex.sideBySide?`
    <div class="side-sel">
      <button class="side-btn ${set.side==='L'?'L':''}" onclick="chgSide('${ex.id}','${set.id}','L')">L</button>
      <button class="side-btn ${set.side==='R'?'R':''}" onclick="chgSide('${ex.id}','${set.id}','R')">R</button>
    </div>`:'';

  // done
  const doneHtml=`<div class="set-done ${set.done?'checked':''}" onclick="toggleDone('${ex.id}','${set.id}')">${set.done?'✓':''}</div>`;

  row.innerHTML=`
    <div class="set-num">${num}</div>
    ${wHtml}${rHtml}${sideHtml}${doneHtml}
    <button class="set-del" onclick="delSet('${ex.id}','${set.id}')">✕</button>
  `;
  return row;
}

/* ============================================================
   Exercise Actions
   ============================================================ */
function addExercise(name){
  const ex={
    id:'ex_'+Date.now(),name,
    bodyweight:false,sideBySide:false,
    sets:[]
  };
  today.exercises.push(ex);
  save();renderExList();
  closeSheet();
}

function removeEx(exId){
  today.exercises=today.exercises.filter(e=>e.id!==exId);
  save();renderExList();
}

function toggleBW(exId){
  const ex=findEx(exId);ex.bodyweight=!ex.bodyweight;
  save();
  document.getElementById('tgl-bw-'+exId)?.classList.toggle('on',ex.bodyweight);
  renderSetList(ex);
}

function toggleSide(exId){
  const ex=findEx(exId);ex.sideBySide=!ex.sideBySide;
  save();
  document.getElementById('tgl-side-'+exId)?.classList.toggle('on',ex.sideBySide);
  renderSetList(ex);
}

/* ============================================================
   Set Actions
   ============================================================ */
function addSet(exId){
  const ex=findEx(exId);
  const last=ex.sets[ex.sets.length-1];
  ex.sets.push({
    id:'set_'+Date.now(),
    weight:last?last.weight:0,
    reps:last?last.reps:10,
    side:null,done:false
  });
  save();renderSetList(ex);
}

function delSet(exId,setId){
  const ex=findEx(exId);
  ex.sets=ex.sets.filter(s=>s.id!==setId);
  save();renderSetList(ex);
}

function chgW(exId,setId,delta){
  const s=findSet(exId,setId);
  s.weight=Math.max(0,Math.round((s.weight+delta)*10)/10);
  save();syncVal(setId,'w',s.weight);
}
function setW(exId,setId,v){findSet(exId,setId).weight=Math.max(0,parseFloat(v)||0);save()}

function chgR(exId,setId,delta){
  const s=findSet(exId,setId);
  s.reps=Math.max(0,s.reps+delta);
  save();syncVal(setId,'r',s.reps);
}
function setR(exId,setId,v){findSet(exId,setId).reps=Math.max(0,parseInt(v)||0);save()}

function syncVal(setId,type,val){
  const row=document.getElementById('setr-'+setId);
  if(!row)return;
  const all=row.querySelectorAll('.sp-val');
  if(type==='w'&&all[0])all[0].value=val;
  if(type==='r'&&all.length>0)all[all.length-1].value=val;
}

function chgSide(exId,setId,side){
  const s=findSet(exId,setId);
  s.side=s.side===side?null:side;
  save();renderSetList(findEx(exId));
}

function toggleDone(exId,setId){
  const s=findSet(exId,setId);
  s.done=!s.done;save();
  // update UI
  const el=document.getElementById('setr-'+setId)?.querySelector('.set-done');
  if(el){el.classList.toggle('checked',s.done);el.textContent=s.done?'✓':'';}
  if(s.done)startTimer(exId);
  else{stopTimer();document.getElementById('tmr-'+exId)?.classList.remove('show')}
}

/* ============================================================
   Copy Previous
   ============================================================ */
function copyPrev(exId){
  const ex=findEx(exId);
  const prev=getPrevEx(ex.name);
  if(!prev)return;
  ex.sets=prev.sets.map(s=>({
    id:'set_'+Date.now()+Math.random(),
    weight:s.weight,reps:s.reps,side:s.side||null,done:false
  }));
  ex.bodyweight=!!prev.bodyweight;
  save();renderSetList(ex);
  showToast('前回のデータをコピーしました');
}

function getPrevEx(name){
  const sessions=getSessions().filter(s=>s.date!==getToday())
    .sort((a,b)=>b.date.localeCompare(a.date));
  for(const s of sessions){
    const ex=s.exercises.find(e=>e.name===name);
    if(ex)return ex;
  }
  return null;
}

/* ============================================================
   Timer
   ============================================================ */
function startTimer(exId){
  stopTimer();
  timerRem=90;timerExId=exId;
  const badge=document.getElementById('tmr-'+exId);
  if(!badge)return;
  badge.classList.add('show');
  updateTimerBadge(badge);
  timerIv=setInterval(()=>{
    timerRem--;
    if(timerRem<=0){stopTimer();badge.classList.remove('show');return}
    updateTimerBadge(badge);
  },1000);
}
function updateTimerBadge(badge){
  const m=Math.floor(timerRem/60),s=timerRem%60;
  badge.innerHTML=`
    <div class="tb-label">🕐 REST</div>
    <div class="tb-time">${m}:${String(s).padStart(2,'0')}</div>
    <button class="tb-btn tb-plus" onclick="timerAdd()">+30s</button>
    <button class="tb-btn tb-skip" onclick="timerSkip()">SKIP</button>`;
}
function timerAdd(){timerRem=Math.min(timerRem+30,600)}
function timerSkip(){
  stopTimer();
  if(timerExId)document.getElementById('tmr-'+timerExId)?.classList.remove('show');
}
function stopTimer(){if(timerIv){clearInterval(timerIv);timerIv=null}}

/* ============================================================
   Note
   ============================================================ */
function saveNote(){today.note=document.getElementById('note-input').value;save()}

/* ============================================================
   Exercise Sheet
   ============================================================ */
function openSheet(){
  document.getElementById('ex-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet-q').value='';
  renderSheetList();
  setTimeout(()=>document.getElementById('sheet-q').focus(),300);
}
function closeSheet(){
  document.getElementById('ex-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderSheetList(){
  const q=document.getElementById('sheet-q').value.trim().toLowerCase();
  const recent=getRecentExNames();
  const allNames=[...new Set([...recent,...PRESETS])];
  let html='';

  if(q){
    const hits=allNames.filter(n=>n.toLowerCase().includes(q));
    html+=`<div class="sh-sec">検索結果</div><div class="sh-chips">`;
    hits.forEach(n=>{html+=`<div class="ex-chip" onclick="addExercise('${esc2(n)}')">${esc(n)}</div>`});
    html+=`</div>`;
    const exact=hits.some(n=>n.toLowerCase()===q.toLowerCase());
    if(!exact){
      const label=document.getElementById('sheet-q').value.trim();
      html+=`<button class="btn btn-accent" style="width:100%;margin-top:8px"
        onclick="addExercise('${esc2(label)}')">「${esc(label)}」を追加</button>`;
    }
  }else{
    if(recent.length){
      html+=`<div class="sh-sec">よく使う種目</div><div class="sh-chips">`;
      recent.forEach(n=>{html+=`<div class="ex-chip" onclick="addExercise('${esc2(n)}')">${esc(n)}</div>`});
      html+=`</div>`;
    }
    html+=`<div class="sh-sec">プリセット</div><div class="sh-chips">`;
    PRESETS.forEach(n=>{html+=`<div class="ex-chip" onclick="addExercise('${esc2(n)}')">${esc(n)}</div>`});
    html+=`</div>`;
  }
  document.getElementById('sheet-body').innerHTML=html;
}

function confirmSheetInput(){
  const v=document.getElementById('sheet-q').value.trim();
  if(v)addExercise(v);
}

function getRecentExNames(){
  const count={};
  getSessions().forEach(s=>s.exercises.forEach(ex=>{count[ex.name]=(count[ex.name]||0)+1}));
  return Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n])=>n);
}

/* ============================================================
   CALENDAR
   ============================================================ */
function calNav(dir){
  calM+=dir;
  if(calM<0){calM=11;calY--}
  if(calM>11){calM=0;calY++}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${calY}年${calM+1}月`;
  const sessions=getSessions();
  const trained=new Set(sessions.map(s=>s.date));
  const todayStr=getToday();
  const firstDow=new Date(calY,calM,1).getDay();
  const offset=firstDow===0?6:firstDow-1;
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const dows=['月','火','水','木','金','土','日'];

  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day',
      trained.has(ds)?'trained':'',
      ds===todayStr?'today':'',
      ds===calSel?'selected':''
    ].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="calClick('${ds}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(calSel)renderCalDetail(calSel);
}

function calClick(ds){
  calSel=ds;
  renderCalendar();
  renderCalDetail(ds);
}

function renderCalDetail(ds){
  const el=document.getElementById('cal-detail');
  const sess=getSessions().find(s=>s.date===ds);
  if(!sess){
    el.innerHTML=`<div style="color:var(--t2);font-size:13px;text-align:center;padding:20px">この日の記録なし</div>`;
    return;
  }
  const d=new Date(ds);
  const dow='日月火水木金土'[d.getDay()];
  let html=`<div class="cal-det-date">${ds}（${dow}）</div>`;
  sess.exercises.forEach(ex=>{
    const rows=ex.sets.map((s,i)=>{
      const w=ex.bodyweight?'BW':`${s.weight}kg`;
      const sd=s.side?` [${s.side}]`:'';
      return `${i+1}: ${w} × ${s.reps}rep${sd}`;
    }).join('<br>');
    html+=`<div class="cal-ex-item">
      <div class="cal-ex-name">${esc(ex.name)}</div>
      <div class="cal-set-txt">${rows}</div>
    </div>`;
  });
  if(sess.note)html+=`<div class="card"><div class="sh">メモ</div><div style="font-size:13px;color:var(--t2)">${esc(sess.note)}</div></div>`;
  el.innerHTML=html;
}

/* ============================================================
   STATS
   ============================================================ */
function renderStats(){
  const sessions=getSessions();
  const now=new Date();

  const thisMonth=sessions.filter(s=>{
    const d=new Date(s.date);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  });

  // streak
  let streak=0;
  const check=new Date();check.setHours(0,0,0,0);
  const dateSet=new Set(sessions.map(s=>s.date));
  for(;;){
    if(!dateSet.has(dateStr(check)))break;
    streak++;check.setDate(check.getDate()-1);
  }

  // month volume
  let mVol=0;
  thisMonth.forEach(s=>s.exercises.forEach(ex=>{
    if(ex.bodyweight)return;
    ex.sets.forEach(set=>{mVol+=set.weight*set.reps});
  }));

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card">
      <div class="stat-label">総トレーニング</div>
      <div class="stat-value">${sessions.length}</div>
      <div class="stat-unit">日</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">今月</div>
      <div class="stat-value">${thisMonth.length}</div>
      <div class="stat-unit">日</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">連続記録</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-unit">日</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">今月ボリューム</div>
      <div class="stat-value" style="font-size:18px">${Math.round(mVol).toLocaleString()}</div>
      <div class="stat-unit">kg</div>
    </div>
  `;

  // max weight per exercise
  const maxMap={};
  sessions.forEach(s=>s.exercises.forEach(ex=>{
    if(ex.bodyweight)return;
    ex.sets.forEach(set=>{
      if((set.weight||0)>(maxMap[ex.name]||0))maxMap[ex.name]=set.weight;
    });
  }));
  const maxList=Object.entries(maxMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  let extra='';
  if(maxList.length){
    extra=`<div class="card"><div class="sh">種目別 MAX重量</div>
      <table class="max-table">
        ${maxList.map(([n,v])=>`<tr><td>${esc(n)}</td><td class="td-val">${v}kg</td></tr>`).join('')}
      </table>
    </div>`;
  }
  document.getElementById('stats-extra').innerHTML=extra;
}

/* ============================================================
   Export / Import
   ============================================================ */
function exportData(){
  const blob=new Blob([JSON.stringify(getSessions(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`training-note-${getToday()}.json`;
  a.click();
  showToast('📤 エクスポートしました');
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){showToast('⚠️ 形式エラー');return}
      const exist=getSessions();
      const ids=new Set(exist.map(s=>s.id));
      const merged=[...exist,...data.filter(s=>!ids.has(s.id))].sort((a,b)=>b.date.localeCompare(a.date));
      setSessions(merged);
      today=getTodaySession()||newSession();
      renderRecord();
      showToast(`✅ ${data.length}件インポートしました`);
    }catch{showToast('⚠️ 読み込み失敗')}
  };
  r.readAsText(file);
  ev.target.value='';
}
function clearAll(){
  if(!confirm('全データを削除しますか？元に戻せません。'))return;
  if(!confirm('最終確認：本当に削除しますか？'))return;
  localStorage.removeItem(STORE_KEY);
  today=newSession();renderRecord();
  showToast('🗑️ 削除しました');
}

/* ============================================================
   Helpers
   ============================================================ */
function findEx(id){return today.exercises.find(e=>e.id===id)}
function findSet(exId,setId){return findEx(exId)?.sets.find(s=>s.id===setId)}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function esc2(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'\\"')}

let toastTmr;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2600);
}

/* Boot */
init();
</script>
</body>
