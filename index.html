<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="筋トレノート">
<meta name="theme-color" content="#f0f4f8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>トレーニングノート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f4f8;color:#1a1a2e;overscroll-behavior:none}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-size:11px;color:#94a3b8;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn.active{color:#3b82f6}
.nav-btn svg{width:22px;height:22px}

/* ── Pages ── */
.page{display:none;padding:16px 14px;padding-bottom:90px;min-height:100svh}
.page.active{display:block}
.page-title{font-size:22px;font-weight:800;margin-bottom:16px;letter-spacing:-0.5px}

/* ── Card ── */
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── Form ── */
.field{margin-bottom:10px}
.field-row{display:flex;gap:8px;align-items:center}
.field-label{font-size:12px;font-weight:600;color:#64748b;min-width:38px;flex-shrink:0}
input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
  border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 11px;font-size:14px;
  width:100%;background:#f8fafc;color:#1a1a2e;outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;background:#fff}
textarea{resize:none;height:60px;font-family:inherit}

/* ── Exercise table ── */
.ex-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px}
.ex-table{width:100%;border-collapse:collapse;font-size:12px}
.ex-table th{background:#f1f5f9;padding:7px 4px;text-align:center;font-weight:700;font-size:11px;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.ex-table td{padding:4px 3px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.ex-table td:first-child{min-width:90px}
.ex-table input{padding:6px 4px;font-size:12px;text-align:center;border-radius:7px}
.ex-table input[placeholder="種目名"]{text-align:left;min-width:88px}
.set-input{width:64px!important}
.del-btn{background:#fee2e2;color:#dc2626;border:none;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:13px;line-height:1}

/* ── Buttons ── */
.btn{border:none;border-radius:12px;padding:12px 18px;cursor:pointer;font-size:15px;font-weight:700;transition:opacity .15s;width:100%}
.btn:active{opacity:.75}
.btn-primary{background:#3b82f6;color:#fff}
.btn-outline{background:#eff6ff;color:#3b82f6;border:1.5px solid #bfdbfe}
.add-ex-btn{color:#3b82f6;background:none;border:none;font-size:13px;font-weight:600;cursor:pointer;padding:8px 0 2px;display:flex;align-items:center;gap:4px}

/* ── History ── */
.history-card{cursor:default}
.history-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.history-date{font-size:14px;font-weight:800;color:#3b82f6}
.history-meta{font-size:12px;color:#94a3b8;margin-top:2px}
.history-ex{margin-bottom:6px}
.history-ex-name{font-size:13px;font-weight:700;margin-bottom:2px}
.history-sets{display:flex;flex-wrap:wrap;gap:4px}
.set-badge{background:#f1f5f9;border-radius:6px;padding:3px 7px;font-size:11px;color:#475569}
.history-memo{margin-top:8px;font-size:12px;color:#64748b;padding-top:8px;border-top:1px solid #f1f5f9}
.del-log-btn{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.empty{text-align:center;padding:50px 20px;color:#94a3b8;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── MAX Table ── */
.max-calc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.max-result-box{background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:12px;padding:14px;text-align:center;margin-top:8px}
.max-result-label{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:4px}
.max-result-value{font-size:28px;font-weight:900;color:#fff}
.max-result-unit{font-size:14px;color:rgba(255,255,255,.8)}
.max-table-wrap{overflow:auto;max-height:55vh;border-radius:12px;border:1px solid #e2e8f0}
.max-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap;width:100%}
.max-tbl th{background:#3b82f6;color:#fff;padding:7px 9px;text-align:center;position:sticky;top:0;z-index:10;font-size:11px}
.max-tbl td{padding:6px 9px;text-align:center;border-bottom:1px solid #f1f5f9}
.max-tbl tr:nth-child(even) td{background:#fafbfc}
.max-tbl tr:hover td{background:#eff6ff}
.max-tbl td:first-child{font-weight:700;background:#f8fafc;position:sticky;left:0;border-right:1px solid #e2e8f0;z-index:5}
.max-tbl tr:nth-child(even) td:first-child{background:#f1f5f9}
.max-tbl tr:hover td:first-child{background:#dbeafe}
.hl-row td{background:#fef9c3!important;font-weight:600}
.hl-row td:first-child{background:#fef08a!important}
.hl-cell{background:#f59e0b!important;color:#fff!important;border-radius:4px;font-weight:800}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Section header ── */
.section-head{font-size:12px;font-weight:700;color:#64748b;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;margin-top:4px}
.divider{height:1px;background:#f1f5f9;margin:12px 0}
</style>
</head>
<body>

<!-- ===== LOG PAGE ===== -->
<div id="page-log" class="page active">
  <div class="page-title">📋 ログ入力</div>

  <div class="card">
    <div class="section-head">セッション情報</div>
    <div class="field">
      <div class="field-row">
        <span class="field-label">日付</span>
        <input type="date" id="log-date">
      </div>
    </div>
    <div class="field">
      <div class="field-row">
        <span class="field-label">時間</span>
        <input type="time" id="log-time">
      </div>
    </div>
    <div class="field" style="margin:0">
      <div class="field-row">
        <span class="field-label">場所</span>
        <input type="text" id="log-place" placeholder="ジム名・自宅など">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-head">種目・セット記録</div>
    <div class="ex-wrap">
      <table class="ex-table">
        <thead>
          <tr>
            <th style="text-align:left;padding-left:6px">種目</th>
            <th>1set</th><th>2set</th><th>3set</th><th>4set</th><th>5set</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ex-tbody"></tbody>
      </table>
    </div>
    <button class="add-ex-btn" onclick="addRow()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      種目を追加
    </button>
  </div>

  <div class="card">
    <div class="section-head">メモ</div>
    <textarea id="log-memo" placeholder="コンディション・気づきなど..."></textarea>
  </div>

  <button class="btn btn-primary" onclick="saveLog()">保存する</button>
</div>

<!-- ===== HISTORY PAGE ===== -->
<div id="page-history" class="page">
  <div class="page-title">📚 履歴</div>
  <div id="history-list"></div>
</div>

<!-- ===== MAX TABLE PAGE ===== -->
<div id="page-max" class="page">
  <div class="page-title">📊 MAX早見表</div>

  <div class="card">
    <div class="section-head">推定MAX計算</div>
    <div class="max-calc-row">
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px">使用重量 (kg)</div>
        <input type="number" id="calc-weight" placeholder="例: 100" step="2.5" min="0" oninput="calcAndHighlight()">
      </div>
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px">レップ数</div>
        <select id="calc-reps" onchange="calcAndHighlight()">
          <option value="">選択</option>
          <option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </div>
    </div>
    <div id="max-result-box" style="display:none" class="max-result-box">
      <div class="max-result-label">推定MAX</div>
      <div><span class="max-result-value" id="max-result-val">-</span> <span class="max-result-unit">kg</span></div>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div class="max-table-wrap">
      <table class="max-tbl" id="max-tbl"></table>
    </div>
  </div>
  <div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:6px">※あくまで参考値です。フォーム・種目によって個人差はあります。</div>
</div>

<!-- ===== NAV ===== -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('log',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    ログ
  </button>
  <button class="nav-btn" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    履歴
  </button>
  <button class="nav-btn" onclick="showPage('max',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
    </svg>
    MAX表
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Init ──
let rowId = 0;

function init() {
  const today = new Date();
  document.getElementById('log-date').value = today.toISOString().slice(0,10);
  document.getElementById('log-time').value = today.toTimeString().slice(0,5);
  addRow(); addRow(); addRow();
  buildMaxTable();
}

// ── Navigation ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
}

// ── Exercise rows ──
function addRow() {
  rowId++;
  const id = rowId;
  const tr = document.createElement('tr');
  tr.id = 'ex-' + id;
  const sets = [1,2,3,4,5].map(s =>
    `<td><input type="text" class="set-input" placeholder="kg×回"></td>`
  ).join('');
  tr.innerHTML = `
    <td><input type="text" placeholder="種目名" style="min-width:88px"></td>
    ${sets}
    <td><button class="del-btn" onclick="document.getElementById('ex-${id}').remove()">✕</button></td>
  `;
  document.getElementById('ex-tbody').appendChild(tr);
}

// ── Save log ──
function saveLog() {
  const date  = document.getElementById('log-date').value;
  const time  = document.getElementById('log-time').value;
  const place = document.getElementById('log-place').value.trim();
  const memo  = document.getElementById('log-memo').value.trim();

  const exercises = [];
  document.querySelectorAll('#ex-tbody tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    const name = inputs[0].value.trim();
    if (!name) return;
    const sets = Array.from(inputs).slice(1)
      .map(i => i.value.trim()).filter(Boolean);
    exercises.push({ name, sets });
  });

  if (!date) { showToast('日付を入力してください'); return; }
  if (!exercises.length) { showToast('種目を1つ以上入力してください'); return; }

  const logs = getLogs();
  logs.unshift({ id: Date.now(), date, time, place, memo, exercises });
  setLogs(logs);
  showToast('✅ 保存しました！');
  resetForm();
}

function resetForm() {
  document.getElementById('log-place').value = '';
  document.getElementById('log-memo').value = '';
  document.getElementById('ex-tbody').innerHTML = '';
  rowId = 0;
  addRow(); addRow(); addRow();
  const today = new Date();
  document.getElementById('log-date').value = today.toISOString().slice(0,10);
  document.getElementById('log-time').value = today.toTimeString().slice(0,5);
}

// ── History ──
function renderHistory() {
  const logs = getLogs();
  const el = document.getElementById('history-list');
  if (!logs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>まだ記録がありません<br><small style="color:#cbd5e1;margin-top:4px;display:block">ログタブから記録を追加しましょう</small></div>';
    return;
  }
  el.innerHTML = logs.map(log => {
    const exHtml = log.exercises.map(ex => `
      <div class="history-ex">
        <div class="history-ex-name">${esc(ex.name)}</div>
        <div class="history-sets">
          ${ex.sets.map((s,i) => `<span class="set-badge">${i+1}set: ${esc(s)}</span>`).join('')}
          ${!ex.sets.length ? '<span class="set-badge" style="color:#94a3b8">記録なし</span>' : ''}
        </div>
      </div>
    `).join('');
    return `
      <div class="card history-card">
        <div class="history-header">
          <div>
            <div class="history-date">${log.date}${log.time ? ' ' + log.time : ''}</div>
            ${log.place ? `<div class="history-meta">📍 ${esc(log.place)}</div>` : ''}
          </div>
          <button class="del-log-btn" onclick="deleteLog(${log.id})">削除</button>
        </div>
        ${exHtml}
        ${log.memo ? `<div class="history-memo">💬 ${esc(log.memo)}</div>` : ''}
      </div>
    `;
  }).join('');
}

function deleteLog(id) {
  if (!confirm('このログを削除しますか？')) return;
  setLogs(getLogs().filter(l => l.id !== id));
  renderHistory();
  showToast('🗑️ 削除しました');
}

// ── MAX Table ──
// Formula from the book: estimated 1RM = weight × (1 + reps × 0.025)
function calcMax(w, r) {
  return Math.round(w * (1 + r * 0.025) * 10) / 10;
}

function buildMaxTable() {
  const reps = [2,3,4,5,6,7,8,9,10];
  let html = '<thead><tr><th>使用重量</th>';
  reps.forEach(r => html += `<th>${r}レップ</th>`);
  html += '</tr></thead><tbody>';

  for (let w = 50; w <= 250; w += 2.5) {
    const wId = 'mw' + w.toString().replace('.','_');
    html += `<tr id="${wId}"><td>${w % 1 === 0 ? w.toFixed(0) : w.toFixed(1)}</td>`;
    reps.forEach((r, ri) => {
      html += `<td id="${wId}r${ri}">${calcMax(w, r).toFixed(1)}</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('max-tbl').innerHTML = html;
}

function calcAndHighlight() {
  // Clear previous highlights
  document.querySelectorAll('.hl-row').forEach(r => r.classList.remove('hl-row'));
  document.querySelectorAll('.hl-cell').forEach(c => c.classList.remove('hl-cell'));

  const weight = parseFloat(document.getElementById('calc-weight').value);
  const reps   = parseInt(document.getElementById('calc-reps').value);
  const box    = document.getElementById('max-result-box');

  if (!weight || weight <= 0) { box.style.display = 'none'; return; }

  // Show result
  if (reps) {
    const max = calcMax(weight, reps);
    document.getElementById('max-result-val').textContent = max.toFixed(1);
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }

  // Find nearest row (round to 2.5)
  const nearest = Math.round(weight / 2.5) * 2.5;
  const clipped = Math.min(250, Math.max(50, nearest));
  const wId = 'mw' + clipped.toString().replace('.','_');
  const row = document.getElementById(wId);
  if (row) {
    row.classList.add('hl-row');
    if (reps) {
      const repsCols = [2,3,4,5,6,7,8,9,10];
      const ri = repsCols.indexOf(reps);
      if (ri >= 0) {
        const cell = document.getElementById(wId + 'r' + ri);
        if (cell) cell.classList.add('hl-cell');
      }
    }
    setTimeout(() => row.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
  }
}

// ── Storage ──
function getLogs() { return JSON.parse(localStorage.getItem('tng-logs') || '[]'); }
function setLogs(l) { localStorage.setItem('tng-logs', JSON.stringify(l)); }

// ── Helpers ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
